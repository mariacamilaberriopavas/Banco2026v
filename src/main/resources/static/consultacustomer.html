<!-- BUSCAR -->
<div class="row mb-3">
<div class="col-md-6 offset-md-3">
<input type="text" id="buscar" class="form-control" placeholder="Buscar cliente..." onkeyup="buscarCliente()">
</div>
</div>

<!-- TABLA -->
<div class="row">
<div class="col-md-12">

<div class="table-responsive">
<table class="table table-striped table-bordered">

<thead style="background:#ff880e;color:white;">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Cuenta</th>
<th>Balance</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaClientes"></tbody>

</table>

</div>

<!-- ================= JS ================= -->
<script src="js/jquery.min.js"></script>
<script src="js/bootstrap.min.js"></script>

<script>

let clientes = [];

// CARGAR AUTOMÁTICO
window.onload = cargarClientes;

function cargarClientes(){

Swal.fire({
title:"Cargando clientes...",
allowOutsideClick:false,
didOpen:()=>Swal.showLoading()
});

fetch("/api/customers")

.then(res => res.json())

.then(data => {

Swal.close();

clientes = data;
mostrarClientes(clientes);

})

.catch(() => {
Swal.fire("Error","No conecta con el backend","error");
});

}

// MOSTRAR
function mostrarClientes(lista){

let tabla = document.getElementById("tablaClientes");
tabla.innerHTML = "";

if(lista.length === 0){
tabla.innerHTML = "<tr><td colspan='6'>No hay clientes</td></tr>";
return;
}

lista.forEach(c => {

tabla.innerHTML += `
<tr>
<td>${c.id}</td>
<td>${c.firstName}</td>
<td>${c.lastName}</td>
<td>${c.accountNumber}</td>
<td>$ ${c.balance}</td>

<td>
<button class="btn btn-warning btn-sm" onclick="editarCliente(${c.id})">Editar</button>
<button class="btn btn-danger btn-sm" onclick="eliminarCliente(${c.id})">Eliminar</button>
</td>

</tr>
`;

});

}

// BUSCAR
function buscarCliente(){

let texto = document.getElementById("buscar").value.toLowerCase();

let filtrados = clientes.filter(c =>
c.firstName.toLowerCase().includes(texto) ||
c.lastName.toLowerCase().includes(texto) ||
c.accountNumber.toLowerCase().includes(texto)
);

mostrarClientes(filtrados);

}

// ELIMINAR
function eliminarCliente(id){

Swal.fire({
title:"¿Eliminar cliente?",
icon:"warning",
showCancelButton:true
})
.then(result => {

if(result.isConfirmed){

fetch(`/api/customers/${id}`,{
method:"DELETE"
})
.then(()=>{
Swal.fire("Eliminado","","success");
cargarClientes();
});

}

});

}

// EDITAR
function editarCliente(id){

fetch(`/api/customers/${id}`)
.then(res=>res.json())
.then(c => {

Swal.fire({

title:"Editar Cliente",

html:`
<input id="nombre" class="swal2-input" value="${c.firstName}">
<input id="apellido" class="swal2-input" value="${c.lastName}">
<input id="cuenta" class="swal2-input" value="${c.accountNumber}">
<input id="balance" class="swal2-input" value="${c.balance}">
`,

confirmButtonText:"Guardar"

})
.then(result => {

if(result.isConfirmed){

let actualizado = {
firstName:document.getElementById("nombre").value,
lastName:document.getElementById("apellido").value,
accountNumber:document.getElementById("cuenta").value,
balance:parseFloat(document.getElementById("balance").value)
};

fetch(`/api/customers/${id}`,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(actualizado)
})
.then(()=>{
Swal.fire("Actualizado","","success");
cargarClientes();
});

}

});

});

}

</script>
