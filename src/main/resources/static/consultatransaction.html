<!-- JS -->
<script src="js/jquery.min.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>

<script>
function buscarTransacciones() {

    const accountNumber = document.getElementById("accountNumber").value;

    if (!accountNumber) {
        Swal.fire("Error", "Ingresa un número de cuenta", "warning");
        return;
    }

    fetch(`/api/transactions/${accountNumber}`)
        .then(response => response.json())
        .then(data => {

            const tabla = document.getElementById("tablaTransacciones");
            tabla.innerHTML = "";

            if (data.length === 0) {
                tabla.innerHTML = "<tr><td colspan='5'>No hay transacciones</td></tr>";
                return;
            }

            data.forEach(t => {

                tabla.innerHTML += `
                    <tr>
                        <td>${t.id}</td>
                        <td>${t.senderAccountNumber}</td>
                        <td>${t.receiverAccountNumber}</td>
                        <td>$ ${t.amount}</td>
                        <td>${t.timestamp}</td>
                    </tr>
                `;
            });

        })
        .catch(error => {
            Swal.fire("Error", "No se pudo consultar", "error");
        });
}
</script>
